<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GMV Max Float</title>
  <style>
    :root {
      color-scheme: dark;
      --panel: rgba(17, 24, 39, 0.18);
      --line: rgba(148, 163, 184, 0.35);
      --text: #f8fafc;
      --muted: #94a3b8;
      --yellow: #fbbf24;
      --blue: #38bdf8;
      --green: #22c55e;
      --red: #ef4444;
      --orange: #f97316;
      --violet: #a78bfa;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-width: 1320px;
      min-height: 720px;
      background: transparent;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    .wrap {
      padding: 14px 16px 16px;
      border: 1px solid var(--line);
      min-height: 100vh;
      background: rgba(0, 0, 0, 0.08);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: 17px;
      letter-spacing: 0;
    }

    .status {
      color: var(--muted);
      font-size: 10px;
      white-space: nowrap;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      background: transparent;
      border: 1px solid var(--line);
    }

    th, td {
      border-bottom: 1px solid rgba(148, 163, 184, 0.28);
      padding: 10px 12px;
      text-align: left;
      vertical-align: middle;
    }

    th {
      color: var(--muted);
      font-size: 9px;
      font-weight: 700;
      background: transparent;
    }

    td.account {
      width: 190px;
      font-size: 12px;
      font-weight: 800;
      color: var(--text);
    }

    .metric {
      display: flex;
      align-items: baseline;
      gap: 6px;
      min-width: 0;
      white-space: nowrap;
    }

    .value {
      font-size: 12px;
      font-weight: 800;
    }

    .spend { color: var(--yellow); }
    .gmv { color: var(--blue); }
    .roi { color: #a78bfa; }
    .total { color: #e5e7eb; }

    .arrow {
      font-size: 10px;
      font-weight: 900;
    }

    .up { color: var(--green); }
    .down { color: var(--red); }
    .flat { color: var(--muted); }

    .diff {
      color: var(--muted);
      font-size: 8px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    tr.budget-alert {
      background: rgba(251, 191, 36, 0.18);
      box-shadow: inset 3px 0 0 rgba(251, 191, 36, 0.95);
    }

    tr.budget-alert td,
    tr.budget-alert .diff {
      color: #fff7ed;
    }

    tr.budget-alert .value {
      text-shadow: 0 0 8px rgba(251, 191, 36, 0.55);
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      margin-bottom: 12px;
    }

    .box {
      border: 1px solid var(--line);
      background: var(--panel);
      padding: 9px 10px;
    }

    .box label {
      display: block;
      color: var(--muted);
      font-size: 9px;
      margin-bottom: 4px;
    }

    .box strong {
      font-size: 13px;
    }

    .empty, .error {
      padding: 40px 20px;
      color: var(--muted);
      font-size: 12px;
      border: 1px solid var(--line);
      background: var(--panel);
    }

    .error { color: #fecaca; }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 14px 0 8px;
      color: var(--text);
      font-size: 12px;
      font-weight: 800;
    }

    .section-title span {
      color: var(--muted);
      font-size: 9px;
      font-weight: 500;
    }

    .live-summary {
      grid-template-columns: 0.7fr repeat(4, 1fr);
    }

    td.live-room {
      width: 165px;
      color: var(--text);
      font-size: 11px;
      font-weight: 800;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .live-viewers { color: var(--blue); }
    .live-preview { color: #67e8f9; }
    .live-rate { color: var(--green); }
    .live-ctr { color: var(--yellow); }
    .live-cost { color: var(--orange); }
    .live-roi { color: var(--violet); }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>LIVE GMV Max + LIVE Rooms</h1>
      <div class="status" id="status">读取中...</div>
    </header>
    <div id="app"></div>
  </div>

  <script>
    const gmvCsvUrl = "./logs/gmvmax-plan-records.csv";
    const liveCsvUrl = "./logs/live-room-records.csv";
    const refreshMs = 30000;
    const accountOrder = ["YOUMILIER KLASIK", "YOUMILIER FASHION", "YOUMILIER", "YOUMI OOTD"];
    const allowedAccounts = new Set(accountOrder);

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let quoted = false;
      for (let index = 0; index < text.length; index += 1) {
        const char = text[index];
        const next = text[index + 1];
        if (quoted && char === '"' && next === '"') {
          cell += '"';
          index += 1;
        } else if (char === '"') {
          quoted = !quoted;
        } else if (!quoted && char === ",") {
          row.push(cell);
          cell = "";
        } else if (!quoted && (char === "\n" || char === "\r")) {
          if (char === "\r" && next === "\n") index += 1;
          row.push(cell);
          if (row.some(Boolean)) rows.push(row);
          row = [];
          cell = "";
        } else {
          cell += char;
        }
      }
      if (cell || row.length) {
        row.push(cell);
        rows.push(row);
      }
      const headers = rows.shift() || [];
      return rows.map(values => Object.fromEntries(headers.map((key, index) => [key, values[index] || ""])));
    }

    function moneyNumber(value) {
      const match = String(value || "").replaceAll(",", "").match(/-?\d+(?:\.\d+)?/);
      return match ? Number(match[0]) : 0;
    }

    function metricNumber(value) {
      const text = String(value || "").replaceAll(",", "").trim();
      const match = text.match(/-?\d+(?:\.\d+)?/);
      if (!match) return null;
      const multiplier = /m\b/i.test(text) ? 1000000 : /k\b/i.test(text) ? 1000 : 1;
      return Number(match[0]) * multiplier;
    }

    function compact(value) {
      if (value == null || !Number.isFinite(value)) return "-";
      if (Math.abs(value) >= 1000000) return `${(value / 1000000).toFixed(2)}M`;
      if (Math.abs(value) >= 1000) return `${(value / 1000).toFixed(2)}K`;
      return value.toLocaleString("en-US", { maximumFractionDigits: 2 });
    }

    function money(value) {
      return `${Number(value || 0).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 })} MYR`;
    }

    function roi(numerator, denominator) {
      const den = Number(denominator || 0);
      if (!den) return null;
      return Number(numerator || 0) / den;
    }

    function roiText(value) {
      if (value == null || !Number.isFinite(value)) return "-";
      return value.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function latestGroups(rows) {
      const timestamps = [...new Set(rows.map(row => row.timestamp).filter(Boolean))];
      const currentTs = timestamps.at(-1);
      const currentRaw = rows.filter(row => row.timestamp === currentTs);
      const current = completeCurrentRows(rows, currentTs, currentRaw);
      return {
        currentTs,
        current,
        previousByKey: previousRowsByKey(rows, currentTs)
      };
    }

    function keyFor(row, index) {
      return row.account || row.campaign || `账号 ${index + 1}`;
    }

    function accountRank(account) {
      const index = accountOrder.indexOf(account);
      return index === -1 ? accountOrder.length : index;
    }

    function hasAccount(row) {
      return Boolean(String(row?.account || "").trim());
    }

    function isRealAccountKey(row, index) {
      const key = keyFor(row, index);
      return (
        hasAccount(row) &&
        Boolean(key) &&
        allowedAccounts.has(key) &&
        !key.startsWith("live-plan-") &&
        !key.startsWith("账号 ")
      );
    }

    function completeCurrentRows(rows, currentTs, currentRows) {
      const validCurrentRows = currentRows.filter((row, index) => isRealAccountKey(row, index));
      const currentKeys = new Set(validCurrentRows.map((row, index) => keyFor(row, index)));
      const latestByKey = new Map();
      for (const row of rows) {
        if (!row.timestamp || row.timestamp > currentTs) continue;
        const key = keyFor(row, latestByKey.size);
        if (!isRealAccountKey(row, latestByKey.size)) continue;
        latestByKey.set(key, row);
      }

      const completed = [...validCurrentRows];
      for (const [key, row] of latestByKey.entries()) {
        if (currentKeys.has(key)) continue;
        completed.push({
          ...row,
          timestamp: currentTs,
          interval_spend_increase: "0.00 MYR",
          interval_order_amount_increase: "0.00 MYR"
        });
      }

      return completed.sort((a, b) => {
        const ak = keyFor(a, 0);
        const bk = keyFor(b, 0);
        return accountRank(ak) - accountRank(bk) || ak.localeCompare(bk);
      });
    }

    function previousRowsByKey(rows, currentTs) {
      const previous = new Map();
      for (const row of rows) {
        if (!row.timestamp || row.timestamp >= currentTs) continue;
        const key = keyFor(row, previous.size);
        if (!isRealAccountKey(row, previous.size)) continue;
        previous.set(key, row);
      }
      return previous;
    }

    function compare(current, previous, field) {
      const now = moneyNumber(current?.[field]);
      const before = moneyNumber(previous?.[field]);
      const diff = now - before;
      if (diff > 0.004) return { arrow: "▲", cls: "up", diff: `+${money(diff)}` };
      if (diff < -0.004) return { arrow: "▼", cls: "down", diff: money(diff) };
      return { arrow: "→", cls: "flat", diff: "0.00 MYR" };
    }

    function compareNumber(now, before, formatter) {
      if (now == null || !Number.isFinite(now) || before == null || !Number.isFinite(before)) {
        return { arrow: "→", cls: "flat", diff: "0.00" };
      }
      const diff = now - before;
      if (diff > 0.004) return { arrow: "▲", cls: "up", diff: `+${formatter(diff)}` };
      if (diff < -0.004) return { arrow: "▼", cls: "down", diff: formatter(diff) };
      return { arrow: "→", cls: "flat", diff: formatter(0) };
    }

    function metric(row, previous, field, cls) {
      const change = compare(row, previous, field);
      return `
        <div class="metric">
          <span class="value ${cls}">${row[field] || "0.00 MYR"}</span>
          <span class="arrow ${change.cls}">${change.arrow}</span>
          <span class="diff">${change.diff}</span>
        </div>
      `;
    }

    function roiMetric(currentValue, previousValue) {
      const change = compareNumber(currentValue, previousValue, roiText);
      return `
        <div class="metric">
          <span class="value roi">${roiText(currentValue)}</span>
          <span class="arrow ${change.cls}">${change.arrow}</span>
          <span class="diff">${change.diff}</span>
        </div>
      `;
    }

    function isBudgetAlert(row) {
      const totalSpend = moneyNumber(row.total_spend);
      const totalBudget = moneyNumber(row.total_budget);
      return totalBudget > 0 && totalSpend >= totalBudget * 0.7;
    }

    function renderGmv(rows) {
      if (!rows.length) return `<div class="empty">等待 GMVMAX 采集数据...</div>`;
      const { currentTs, current, previousByKey } = latestGroups(rows);
      const spendTotal = current.reduce((sum, row) => sum + moneyNumber(row.interval_spend_increase), 0);
      const gmvTotal = current.reduce((sum, row) => sum + moneyNumber(row.interval_order_amount_increase), 0);
      const totalSpend = current.reduce((sum, row) => sum + moneyNumber(row.total_spend), 0);
      const totalGmv = current.reduce((sum, row) => sum + moneyNumber(row.total_order_amount), 0);
      const newRoi = roi(gmvTotal, spendTotal);
      const totalRoi = roi(totalGmv, totalSpend);

      const updatedAt = new Date(currentTs).toLocaleString("zh-CN", {
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      });
      return `
        <section class="summary">
          <div class="box"><label>新增消耗</label><strong class="spend">${money(spendTotal)}</strong></div>
          <div class="box"><label>新增成交</label><strong class="gmv">${money(gmvTotal)}</strong></div>
          <div class="box"><label>新增整体 ROI</label><strong class="roi">${roiText(newRoi)}</strong></div>
          <div class="box"><label>总消耗</label><strong>${money(totalSpend)}</strong></div>
          <div class="box"><label>总成交</label><strong>${money(totalGmv)}</strong></div>
          <div class="box"><label>总 ROI</label><strong class="roi">${roiText(totalRoi)}</strong></div>
        </section>
        <table>
          <thead>
            <tr>
              <th style="width: 165px;">账号</th>
              <th>新增消耗</th>
              <th>新增成交</th>
              <th>新增 ROI</th>
              <th>总消耗</th>
              <th>总成交</th>
              <th>总 ROI</th>
            </tr>
          </thead>
          <tbody>
            ${current.map((row, index) => {
              const key = keyFor(row, index);
              const previousRow = previousByKey.get(key);
              const rowNewRoi = roi(moneyNumber(row.interval_order_amount_increase), moneyNumber(row.interval_spend_increase));
              const previousNewRoi = previousRow
                ? roi(moneyNumber(previousRow.interval_order_amount_increase), moneyNumber(previousRow.interval_spend_increase))
                : null;
              const rowTotalRoi = roi(moneyNumber(row.total_order_amount), moneyNumber(row.total_spend));
              const previousTotalRoi = previousRow
                ? roi(moneyNumber(previousRow.total_order_amount), moneyNumber(previousRow.total_spend))
                : null;
              const alertClass = isBudgetAlert(row) ? " class=\"budget-alert\"" : "";
              return `
                <tr${alertClass}>
                  <td class="account">${key}</td>
                  <td>${metric(row, previousRow, "interval_spend_increase", "spend")}</td>
                  <td>${metric(row, previousRow, "interval_order_amount_increase", "gmv")}</td>
                  <td>${roiMetric(rowNewRoi, previousNewRoi)}</td>
                  <td>${metric(row, previousRow, "total_spend", "total")}</td>
                  <td>${metric(row, previousRow, "total_order_amount", "total")}</td>
                  <td>${roiMetric(rowTotalRoi, previousTotalRoi)}</td>
                </tr>
              `;
            }).join("")}
          </tbody>
        </table>
      `;
    }

    function latestLiveGroups(rows) {
      const timestamps = [...new Set(rows.map(row => row.timestamp).filter(Boolean))];
      const currentTs = timestamps.at(-1);
      const groups = timestamps.map(timestamp => ({
        timestamp,
        rows: dedupeLiveRows(rows.filter(row => row.timestamp === timestamp))
      }));
      const recentGroups = groups.slice(-6);
      const expectedCount = recentGroups.reduce((max, group) => Math.max(max, group.rows.length), 0);
      const byRoom = new Map();
      for (let index = recentGroups.length - 1; index >= 0; index -= 1) {
        for (const row of recentGroups[index].rows) {
          const key = liveRowKey(row);
          if (key && !byRoom.has(key)) byRoom.set(key, row);
        }
        if (byRoom.size >= expectedCount) break;
      }
      const current = [...byRoom.values()];
      const previousByRoom = previousLiveRowsByRoom(rows, current);
      return { currentTs, current, previousByRoom };
    }

    function previousLiveRowsByRoom(rows, currentRows) {
      const currentByRoom = new Map(currentRows.map(row => [liveRowKey(row), row]));
      const previousByRoom = new Map();
      for (const row of rows) {
        const key = liveRowKey(row);
        const current = currentByRoom.get(key);
        if (!current || !row.timestamp || row.timestamp >= current.timestamp) continue;
        previousByRoom.set(key, row);
      }
      return previousByRoom;
    }

    function dedupeLiveRows(rows) {
      const byKey = new Map();
      for (const row of rows) {
        const key = liveRowKey(row);
        const existing = byKey.get(key);
        if (!existing || liveRowScore(row) > liveRowScore(existing)) byKey.set(key, row);
      }
      return [...byKey.values()];
    }

    function liveRowKey(row) {
      return roomIdFromUrl(row.url) || row.room || row.url || "";
    }

    function roomIdFromUrl(value = "") {
      try {
        return new URL(value).searchParams.get("room_id") || "";
      } catch {
        return "";
      }
    }

    function displayLiveRoom(row) {
      if (row.room && !/^room-\d+/i.test(row.room)) return row.room;
      return row.room || "-";
    }

    function liveRowScore(row) {
      let score = row.room && !/^room-\d+/i.test(row.room) ? 10 : 0;
      for (const field of ["current_viewers", "tap_through_rate_via_live_preview", "tap_through_rate", "live_ctr", "order_rate_sku_orders", "ads_cost", "gmv_max_roi"]) {
        if (row[field]) score += 1;
      }
      return score;
    }

    function compareMetric(current, previous, field) {
      const now = metricNumber(current?.[field]);
      const before = metricNumber(previous?.[field]);
      if (now == null || before == null) return { arrow: "→", cls: "flat", diff: "" };
      const diff = now - before;
      if (diff > 0.004) return { arrow: "▲", cls: "up", diff: `+${compact(diff)}` };
      if (diff < -0.004) return { arrow: "▼", cls: "down", diff: compact(diff) };
      return { arrow: "→", cls: "flat", diff: "0" };
    }

    function liveMetric(row, previous, field, cls) {
      const change = compareMetric(row, previous, field);
      return `
        <div class="metric">
          <span class="value ${cls}">${row[field] || "-"}</span>
          <span class="arrow ${change.cls}">${change.arrow}</span>
          <span class="diff">${change.diff}</span>
        </div>
      `;
    }

    function avg(rows, field) {
      const values = rows.map(row => metricNumber(row[field])).filter(value => value != null && Number.isFinite(value));
      if (!values.length) return null;
      return values.reduce((sum, value) => sum + value, 0) / values.length;
    }

    function sum(rows, field) {
      return rows.reduce((total, row) => total + (metricNumber(row[field]) || 0), 0);
    }

    function renderLive(rows) {
      if (!rows.length) return `<div class="empty">等待直播间采集数据...</div>`;
      const { current, previousByRoom } = latestLiveGroups(rows);
      return `
        <section class="summary live-summary">
          <div class="box"><label>直播间</label><strong>${current.length}</strong></div>
          <div class="box"><label>实时在线人数</label><strong class="live-viewers">${compact(sum(current, "current_viewers"))}</strong></div>
          <div class="box"><label>Ads Cost</label><strong class="live-cost">${compact(sum(current, "ads_cost"))}</strong></div>
          <div class="box"><label>平均 LIVE CTR</label><strong class="live-ctr">${compact(avg(current, "live_ctr"))}%</strong></div>
          <div class="box"><label>平均 GMV Max ROI</label><strong class="live-roi">${compact(avg(current, "gmv_max_roi"))}</strong></div>
        </section>
        <table>
          <thead>
            <tr>
              <th style="width: 165px;">直播间</th>
              <th>实时在线人数</th>
              <th>Tap-through via LIVE preview</th>
              <th>Tap-through rate</th>
              <th>LIVE CTR</th>
              <th>Order rate (SKU orders)</th>
              <th>Ads Cost</th>
              <th>GMV Max ROI</th>
            </tr>
          </thead>
          <tbody>
            ${current.map(row => {
              const previous = previousByRoom.get(liveRowKey(row));
              return `
                <tr>
                  <td class="live-room" title="${row.room || ""}">${displayLiveRoom(row)}</td>
                  <td>${liveMetric(row, previous, "current_viewers", "live-viewers")}</td>
                  <td>${liveMetric(row, previous, "tap_through_rate_via_live_preview", "live-preview")}</td>
                  <td>${liveMetric(row, previous, "tap_through_rate", "live-rate")}</td>
                  <td>${liveMetric(row, previous, "live_ctr", "live-ctr")}</td>
                  <td>${liveMetric(row, previous, "order_rate_sku_orders", "live-rate")}</td>
                  <td>${liveMetric(row, previous, "ads_cost", "live-cost")}</td>
                  <td>${liveMetric(row, previous, "gmv_max_roi", "live-roi")}</td>
                </tr>
              `;
            }).join("")}
          </tbody>
        </table>
      `;
    }

    function latestTimestamp(rows) {
      return [...new Set(rows.map(row => row.timestamp).filter(Boolean))].at(-1) || "";
    }

    function formatTime(timestamp) {
      if (!timestamp) return "";
      return new Date(timestamp).toLocaleString("zh-CN", {
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      });
    }

    function render(gmvRows, liveRows) {
      const app = document.getElementById("app");
      const status = document.getElementById("status");
      if (!gmvRows.length && !liveRows.length) {
        app.innerHTML = `<div class="empty">等待采集数据...</div>`;
        status.textContent = "no data";
        return;
      }

      const gmvTs = latestTimestamp(gmvRows);
      const liveTs = latestTimestamp(liveRows);
      const checkedAt = new Date().toLocaleTimeString("zh-CN", {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      });
      status.textContent = `GMVMAX ${formatTime(gmvTs) || "-"} | LIVE ${formatTime(liveTs) || "-"} | 检查 ${checkedAt}`;
      app.innerHTML = `
        <div class="section-title">GMVMAX 广告效果 <span>${formatTime(gmvTs) || "等待数据"}</span></div>
        ${renderGmv(gmvRows)}
        <div class="section-title">直播间实时指标 <span>${formatTime(liveTs) || "等待数据"}</span></div>
        ${renderLive(liveRows)}
      `;
    }

    async function readCsv(url, optional = false) {
      const response = await fetch(`${url}?t=${Date.now()}`);
      if (!response.ok) {
        if (optional && response.status === 404) return [];
        throw new Error(`${response.status} ${response.statusText}`);
      }
      return parseCsv(await response.text());
    }

    async function load() {
      try {
        const [gmvRows, liveRows] = await Promise.all([
          readCsv(gmvCsvUrl, true),
          readCsv(liveCsvUrl, true)
        ]);
        render(gmvRows, liveRows);
      } catch (error) {
        document.getElementById("status").textContent = "error";
        document.getElementById("app").innerHTML = `<div class="error">读取数据失败：${error.message}</div>`;
      }
    }

    load();
    setInterval(load, refreshMs);
  </script>
</body>
</html>
