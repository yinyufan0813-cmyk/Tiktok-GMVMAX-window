<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="GMV Max" />
  <link rel="manifest" href="/mobile.webmanifest" />
  <title>GMV Max</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f172a;
      --panel: #111827;
      --line: #334155;
      --text: #f8fafc;
      --muted: #94a3b8;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #fbbf24;
      --blue: #38bdf8;
      --orange: #f97316;
      --violet: #a78bfa;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .app {
      padding: calc(env(safe-area-inset-top) + 14px) 14px calc(env(safe-area-inset-bottom) + 18px);
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .status {
      color: var(--muted);
      font-size: 12px;
      text-align: right;
      white-space: nowrap;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin: 16px 0 8px;
      color: var(--text);
      font-size: 14px;
      font-weight: 800;
    }

    .section-title span {
      color: var(--muted);
      font-size: 11px;
      font-weight: 500;
      text-align: right;
    }

    .tile,
    .card {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 8px;
    }

    .tile {
      padding: 10px;
      min-width: 0;
    }

    .label {
      display: block;
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 5px;
    }

    .metric {
      display: flex;
      align-items: baseline;
      gap: 5px;
      min-width: 0;
    }

    .value {
      font-size: 16px;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .diff {
      display: block;
      color: var(--muted);
      font-size: 11px;
      margin-top: 3px;
      overflow-wrap: anywhere;
    }

    .arrow {
      font-size: 13px;
      font-weight: 900;
    }

    .up { color: var(--green); }
    .down { color: var(--red); }
    .flat { color: var(--muted); }
    .spend { color: var(--yellow); }
    .gmv { color: var(--blue); }
    .roi { color: var(--violet); }
    .live { color: var(--green); }
    .cost { color: var(--orange); }
    .total { color: #e5e7eb; }

    .cards {
      display: grid;
      gap: 10px;
    }

    .card {
      padding: 12px;
    }

    .account {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }

    .account strong {
      font-size: 15px;
      overflow-wrap: anywhere;
    }

    .campaign {
      color: var(--muted);
      font-size: 11px;
      text-align: right;
      overflow-wrap: anywhere;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .error,
    .empty {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      color: var(--muted);
      background: var(--panel);
      line-height: 1.5;
    }

    .error { color: #fecaca; }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>GMVMAX + LIVE</h1>
      <div class="status" id="status">读取中...</div>
    </header>
    <section id="app"></section>
  </main>

  <script>
    const app = document.getElementById("app");
    const status = document.getElementById("status");
    const refreshMs = 30000;

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/mobile-sw.js").catch(() => {});
    }

    function money(value) {
      return `${Number(value || 0).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 })} MYR`;
    }

    function roi(value) {
      return Number(value || 0).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function compact(value) {
      const number = Number(value || 0);
      if (Math.abs(number) >= 1000000) return `${(number / 1000000).toFixed(2)}M`;
      if (Math.abs(number) >= 1000) return `${(number / 1000).toFixed(2)}K`;
      return number.toLocaleString("en-US", { maximumFractionDigits: 2 });
    }

    function percent(value) {
      return `${Number(value || 0).toLocaleString("en-US", { maximumFractionDigits: 2 })}%`;
    }

    function arrow(metric) {
      const symbol = metric.direction === "up" ? "▲" : metric.direction === "down" ? "▼" : "→";
      return `<span class="arrow ${metric.direction}">${symbol}</span>`;
    }

    function metricBlock(label, metric, cls, formatter) {
      return `
        <div class="tile">
          <span class="label">${label}</span>
          <div class="metric">
            <span class="value ${cls}">${formatter(metric.value)}</span>
            ${arrow(metric)}
          </div>
          <span class="diff">${metric.diff >= 0 ? "+" : ""}${formatter(metric.diff)}</span>
        </div>
      `;
    }

    function timeText(timestamp) {
      return timestamp ? new Date(timestamp).toLocaleTimeString("zh-CN", { hour12: false }) : "-";
    }

    function renderGmv(gmv) {
      if (!gmv.accounts.length) return `<div class="empty">还没有采集到 GMVMAX 账号数据。</div>`;
      return `
        <div class="summary">
          ${metricBlock("新增消耗", gmv.summary.intervalSpend, "spend", money)}
          ${metricBlock("新增成交", gmv.summary.intervalOrder, "gmv", money)}
          ${metricBlock("新增 ROI", gmv.summary.intervalRoi, "roi", roi)}
          ${metricBlock("总 ROI", gmv.summary.totalRoi, "roi", roi)}
        </div>
        <div class="cards">
          ${gmv.accounts.map(account => `
            <article class="card">
              <div class="account">
                <strong>${account.account}</strong>
                <span class="campaign">${account.campaign || ""}</span>
              </div>
              <div class="grid">
                ${metricBlock("新增消耗", account.intervalSpend, "spend", money)}
                ${metricBlock("新增成交", account.intervalOrder, "gmv", money)}
                ${metricBlock("新增 ROI", account.intervalRoi, "roi", roi)}
                ${metricBlock("总 ROI", account.totalRoi, "roi", roi)}
                ${metricBlock("总消耗", account.totalSpend, "total", money)}
                ${metricBlock("总成交", account.totalOrder, "total", money)}
              </div>
            </article>
          `).join("")}
        </div>
      `;
    }

    function renderLive(live) {
      if (!live.rooms.length) return `<div class="empty">还没有采集到直播间数据。</div>`;
      return `
        <div class="summary">
          ${metricBlock("直播间数量", { value: live.roomCount, diff: 0, direction: "flat" }, "live", compact)}
          ${metricBlock("实时在线人数", live.summary.currentViewers, "live", compact)}
          ${metricBlock("Ads Cost", live.summary.adsCost, "cost", compact)}
          ${metricBlock("平均 ROI", live.summary.avgRoi, "roi", roi)}
        </div>
        <div class="cards">
          ${live.rooms.map(room => `
            <article class="card">
              <div class="account">
                <strong>${room.room}</strong>
                <span class="campaign">LIVE</span>
              </div>
              <div class="grid">
                ${metricBlock("实时在线人数", room.currentViewers, "live", compact)}
                ${metricBlock("LIVE preview TTR", room.tapThroughRateViaLivePreview, "gmv", percent)}
                ${metricBlock("Tap-through rate", room.tapThroughRate, "gmv", percent)}
                ${metricBlock("LIVE CTR", room.liveCtr, "spend", percent)}
                ${metricBlock("Order rate", room.orderRateSkuOrders, "live", percent)}
                ${metricBlock("Ads Cost", room.adsCost, "cost", compact)}
                ${metricBlock("GMV Max ROI", room.gmvMaxRoi, "roi", roi)}
              </div>
            </article>
          `).join("")}
        </div>
      `;
    }

    function render(data) {
      const gmv = data.gmv || { accounts: [], summary: {} };
      const live = data.live || { rooms: [], summary: {} };
      status.textContent = `GMV ${timeText(gmv.updatedAt)} | LIVE ${timeText(live.updatedAt)}`;

      app.innerHTML = `
        <div class="section-title">GMVMAX 广告效果 <span>${timeText(gmv.updatedAt)}</span></div>
        ${renderGmv(gmv)}
        <div class="section-title">直播间实时指标 <span>${timeText(live.updatedAt)}</span></div>
        ${renderLive(live)}
      `;
    }

    async function load() {
      try {
        const token = new URLSearchParams(location.search).get("token") || "";
        const tokenPart = token ? `&token=${encodeURIComponent(token)}` : "";
        const response = await fetch(`/api/latest?t=${Date.now()}${tokenPart}`, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        render(await response.json());
      } catch (error) {
        status.textContent = "读取失败";
        app.innerHTML = `<div class="error">无法读取数据：${error.message}</div>`;
      }
    }

    load();
    setInterval(load, refreshMs);
  </script>
</body>
</html>
